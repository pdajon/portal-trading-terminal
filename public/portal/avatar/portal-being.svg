<svg width="512" height="512" viewBox="62 108 388 370" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Portal Being placeholder">
  <style>
    .portal-being-eye,
    .portal-being-eye-highlight {
      transform-box: fill-box;
      transform-origin: center;
      animation: portalBeingEyeBlink 7.2s ease-in-out infinite;
    }

    .portal-being-eye-highlight {
      animation-name: portalBeingEyeHighlightBlink;
    }

    @keyframes portalBeingEyeBlink {
      0%,
      84%,
      89%,
      100% {
        transform: scaleY(1);
      }

      86.4%,
      87.2% {
        transform: scaleY(0.08);
      }
    }

    @keyframes portalBeingEyeHighlightBlink {
      0%,
      84%,
      89%,
      100% {
        opacity: 0.44;
        transform: scaleY(1);
      }

      86.4%,
      87.2% {
        opacity: 0.12;
        transform: scaleY(0.08);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .portal-being-eye,
      .portal-being-eye-highlight {
        animation: none;
      }
    }
  </style>
  <defs>
    <radialGradient id="bodyFill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(222 202) rotate(67) scale(316 267)">
      <stop stop-color="#243C6B" stop-opacity="0.95"/>
      <stop offset="0.36" stop-color="#121936" stop-opacity="0.98"/>
      <stop offset="0.7" stop-color="#080B19"/>
      <stop offset="1" stop-color="#04050B"/>
    </radialGradient>
    <radialGradient id="facePlate" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 244) rotate(90) scale(86 142)">
      <stop stop-color="#080B11"/>
      <stop offset="0.62" stop-color="#02040A"/>
      <stop offset="1" stop-color="#000106"/>
    </radialGradient>
    <linearGradient id="rimStroke" x1="103" y1="148" x2="407" y2="436" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6" stop-opacity="0.82"/>
      <stop offset="0.48" stop-color="#67E8F9" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.36"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="211" y1="228" x2="305" y2="309" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CFFAFE"/>
      <stop offset="0.42" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="sideFill" x1="101" y1="235" x2="411" y2="337" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B1B83"/>
      <stop offset="0.5" stop-color="#0B1532"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <radialGradient id="lowerNubFill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 416) rotate(90) scale(74 122)">
      <stop stop-color="#17264D"/>
      <stop offset="0.48" stop-color="#0B1128"/>
      <stop offset="1" stop-color="#04050B"/>
    </radialGradient>
    <filter id="softAura" x="54" y="72" width="404" height="392" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="eyeAura" x="180" y="204" width="154" height="94" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

